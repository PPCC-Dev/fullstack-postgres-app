version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ppcc-db
    environment:
      POSTGRES_USER: tunited
      POSTGRES_PASSWORD: password
      POSTGRES_DB: apex_support_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/init-db:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
    container_name: ppcc-backend
    environment:
      - PORT=5001
      - DB_USER=tunited
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_DATABASE=apex_support_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkeyforapexsupportdesk2026!
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    ports:
      - "5001:5001"
    volumes:
      - ./backend/src/uploads:/app/src/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: ppcc-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
